version: '3.8'

services:
  app:
    build: .
    container_name: visa-app
    network_mode: host
    env_file:
      - .env.docker
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:BantuCRM123%40@db.bzdelpmcewjdvmgyafux.supabase.co:5432/postgres
    volumes:
      - ./prisma:/app/prisma
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: visa-nginx
    network_mode: host
    volumes:
      - ./nginx/visa.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/logs:/var/log/nginx
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - app
    restart: unless-stopped
